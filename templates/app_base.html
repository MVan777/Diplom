<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Мини-навигация без главного меню -->
    <header class="app-header">
        <div class="container">
            <div class="app-navbar">
                <a href="{% url 'tasks:planner' %}" class="logo">
                    <i class="fas fa-tasks"></i> Smart-Planner
                </a>

                <div class="app-user-menu">
                    {% if user.is_authenticated %}
                        <span class="user-greeting">{{ user.username }}</span>
                        <a href="{% url 'users:user_profile' %}" class="nav-icon" title="Профиль">
                            <i class="fas fa-user-circle"></i>
                        </a>
                        <a href="{% url 'users:logout' %}" class="nav-link" title="Выход">
                            <i class="fas fa-sign-out-alt"></i> Выход
                        </a>
                    {% else %}
                        <a href="{% url 'users:signin' %}" class="nav-link">Войти</a>
                        <a href="{% url 'users:signup' %}" class="nav-link">Регистрация</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024-2026 Smart-Planner. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
