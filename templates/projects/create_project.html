{% extends 'app_base.html' %}
{% load static %}

{% block title %}Создать проект{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1><i class="fas fa-plus-circle"></i> Создать новый проект</h1>
    </div>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Название проекта *</label>
            <input type="text" id="name" name="name" placeholder="Введите название проекта" required>
        </div>

        <div class="form-group">
            <label for="description">Описание (опционально)</label>
            <textarea id="description" name="description" placeholder="Опишите суть проекта..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-check"></i> Создать проект
            </button>
            <a href="{% url 'projects:list' %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Отмена
            </a>
        </div>
    </form>
</div>
{% endblock %}
